<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Standby</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Exo+2:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="standby-body">
    <div class="standby-clock" id="sb-time">--:--</div>
    <div class="standby-label">Sistem Standby</div>
    <div class="standby-sub">Layar aktif mulai pukul {{ time_on }}</div>

    <script>
        const TIME_ON  = "{{ time_on }}";   // dari Flask config
        const TIME_OFF = "{{ time_off }}";  // dari Flask config

        // Jam berjalan
        function tick() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('sb-time').textContent = h + ':' + m;
        }
        tick();
        setInterval(tick, 1000);

        // Logika jadwal — sama persis dengan is_display_on() di Python dan script.js
        function isDisplayOn(nowMin, onMin, offMin) {
            if (onMin <= offMin) {
                return nowMin >= onMin && nowMin < offMin;
            } else {
                // Overnight: OFF hanya di celah kecil antara off–on
                return nowMin >= onMin || nowMin < offMin;
            }
        }

        // Cek wakeup setiap detik ke-0 (menit berganti) + polling API sebagai backup
        function checkWakeUpClock() {
            const now = new Date();
            if (now.getSeconds() !== 0) return;

            const nowMin = now.getHours() * 60 + now.getMinutes();
            const [onH,  onM]  = TIME_ON.split(':').map(Number);
            const [offH, offM] = TIME_OFF.split(':').map(Number);
            const onMin  = onH  * 60 + onM;
            const offMin = offH * 60 + offM;

            if (isDisplayOn(nowMin, onMin, offMin)) {
                console.log('Wakeup via clock! Redirecting...');
                window.location.href = '/';
            }
        }

        // API polling sebagai backup (hanya setiap 30 detik)
        async function checkWakeUpAPI() {
            try {
                const resp = await fetch('/api/schedule/status');
                if (!resp.ok) return;
                const data = await resp.json();
                if (data.display_on) {
                    console.log('Wakeup via API! Redirecting...');
                    window.location.href = '/';
                }
            } catch (e) { /* server belum siap */ }
        }

        // Cek langsung saat halaman load
        checkWakeUpAPI();

        // Clock check setiap detik
        setInterval(checkWakeUpClock, 1000);
        // API polling setiap 30 detik sebagai backup
        setInterval(checkWakeUpAPI, 30 * 1000);
    </script>
</body>
</html>
