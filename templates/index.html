<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage - {{ device_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Main Display Container -->
    <div id="main-display">
        <!-- Templates will be dynamically loaded here -->
    </div>

    <!-- Advertisement Popup (bottom-right by default) -->
    <div id="ad-popup" class="ad-popup hidden">
        <div class="ad-content">
            <img id="ad-image" class="hidden" src="" alt="Advertisement">
            <video id="ad-video" class="hidden" autoplay muted></video>
        </div>
        <button id="ad-close" class="ad-close">✕</button>
    </div>

    <!-- Running News Ticker -->
    <div id="news-ticker" class="news-ticker">
        <div class="ticker-wrap">
            <div class="ticker-content">
                {% for item in news %}
                <span class="ticker-item">{{ item.content }}</span>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- Photo Booth Button (bottom center) -->
    <button id="photobooth-btn" class="photobooth-btn">
        📸 PHOTO BOOTH
    </button>

    <!-- Loading Indicator -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
    </div>

    <script>
        // =====================================================
        // CONFIGURATION & GLOBAL VARIABLES
        // =====================================================
        
        const CONFIG = {
            templates: {{ templates|tojson }},
            advertisements: {{ ads|tojson }},
            agendas: {{ agendas|tojson }},
            currentTemplateIndex: 0,
            currentAdIndex: 0,
            templateTimer: null,
            adTimer: null,
            adTriggerTimer: null,
        };

        // =====================================================
        // TEMPLATE DISPLAY SYSTEM
        // =====================================================
        
        function initDisplay() {
            console.log('🚀 Initializing display system...');
            console.log('📋 Templates:', CONFIG.templates.length);
            console.log('📢 Advertisements:', CONFIG.advertisements.length);
            
            if (CONFIG.templates.length === 0) {
                showError('No active templates found');
                return;
            }
            
            // Start displaying templates
            displayTemplate(0);
        }

        function displayTemplate(index) {
            // Loop back to start
            if (index >= CONFIG.templates.length) {
                index = 0;
            }
            
            CONFIG.currentTemplateIndex = index;
            const template = CONFIG.templates[index];
            
            console.log(`🎬 Displaying template ${index + 1}/${CONFIG.templates.length}: ${template.template_name}`);
            console.log(`   Type: ${template.template_type}, Duration: ${template.duration}s`);
            
            // Clear current display
            const display = document.getElementById('main-display');
            display.innerHTML = '';
            
            // Display based on type
            switch(template.template_type) {
                case 'html':
                    displayHTMLTemplate(template);
                    break;
                case 'image':
                    displayImageTemplate(template);
                    break;
                case 'video':
                    displayVideoTemplate(template);
                    break;
                default:
                    console.error('Unknown template type:', template.template_type);
            }
            
            // Schedule advertisement popup
            scheduleAdvertisement(template.duration);
            
            // Schedule next template
            clearTimeout(CONFIG.templateTimer);
            CONFIG.templateTimer = setTimeout(() => {
                displayTemplate(index + 1);
            }, template.duration * 1000);
        }

        function displayHTMLTemplate(template) {
            const display = document.getElementById('main-display');
            display.className = 'template-html';
            
            // Create HTML template layout (agenda layout)
            const agendas = CONFIG.agendas;
            
            let html = `
                <div class="html-template">
                    <div class="template-header">
                        <h1>${template.template_name}</h1>
                    </div>
                    <div class="agenda-grid">
            `;
            
            agendas.forEach((agenda, i) => {
                if (i < 3) {  // Max 3 agendas
                    html += `
                        <div class="agenda-card">
                            <div class="agenda-media">
                                ${agenda.media_type === 'photo' 
                                    ? `<img src="/${agenda.media_path}" alt="${agenda.title}">`
                                    : `<video src="/${agenda.media_path}" autoplay muted loop></video>`
                                }
                            </div>
                            <div class="agenda-content">
                                <h2>${agenda.title}</h2>
                                <p>${agenda.description}</p>
                                <div class="agenda-date">📅 ${agenda.event_date}</div>
                            </div>
                        </div>
                    `;
                }
            });
            
            html += `
                    </div>
                </div>
            `;
            
            display.innerHTML = html;
        }

        function displayImageTemplate(template) {
            const display = document.getElementById('main-display');
            display.className = 'template-image';
            
            display.innerHTML = `
                <div class="image-template">
                    <img src="/${template.file_path}" alt="${template.template_name}">
                </div>
            `;
        }

        function displayVideoTemplate(template) {
            const display = document.getElementById('main-display');
            display.className = 'template-video';
            
            display.innerHTML = `
                <div class="video-template">
                    <video src="/${template.file_path}" autoplay muted loop></video>
                </div>
            `;
        }

        // =====================================================
        // ADVERTISEMENT POPUP SYSTEM
        // =====================================================
        
        function scheduleAdvertisement(templateDuration) {
            // Clear previous ad timers
            clearTimeout(CONFIG.adTriggerTimer);
            
            if (CONFIG.advertisements.length === 0) {
                console.log('⚠️  No advertisements available');
                return;
            }
            
            // Get random ad
            const ad = CONFIG.advertisements[CONFIG.currentAdIndex];
            const triggerTime = ad.trigger_time || 10; // Default 10 seconds before end
            
            // Calculate when to show ad (template duration - trigger time)
            const showAdAt = (templateDuration - triggerTime) * 1000;
            
            console.log(`📢 Advertisement scheduled: Show in ${showAdAt/1000}s`);
            
            CONFIG.adTriggerTimer = setTimeout(() => {
                showAdvertisement(ad);
            }, Math.max(0, showAdAt));
        }

        function showAdvertisement(ad) {
            console.log(`📢 Showing advertisement: ${ad.ad_name}`);
            
            const popup = document.getElementById('ad-popup');
            const adImage = document.getElementById('ad-image');
            const adVideo = document.getElementById('ad-video');
            
            // Reset
            adImage.classList.add('hidden');
            adVideo.classList.add('hidden');
            
            // Set position
            popup.className = `ad-popup ad-position-${ad.position || 'bottom-right'}`;
            
            // Load ad content
            if (ad.ad_type === 'image') {
                adImage.src = '/' + ad.file_path;
                adImage.classList.remove('hidden');
            } else if (ad.ad_type === 'video') {
                adVideo.src = '/' + ad.file_path;
                adVideo.classList.remove('hidden');
                adVideo.load();
            }
            
            // Show popup
            popup.classList.remove('hidden');
            
            // Auto-hide after duration
            clearTimeout(CONFIG.adTimer);
            CONFIG.adTimer = setTimeout(() => {
                hideAdvertisement();
            }, ad.duration * 1000);
            
            // Move to next ad for next time
            CONFIG.currentAdIndex = (CONFIG.currentAdIndex + 1) % CONFIG.advertisements.length;
        }

        function hideAdvertisement() {
            const popup = document.getElementById('ad-popup');
            popup.classList.add('hidden');
            
            // Stop video if playing
            const adVideo = document.getElementById('ad-video');
            adVideo.pause();
            adVideo.currentTime = 0;
        }

        // =====================================================
        // EVENT HANDLERS
        // =====================================================
        
        // Photo booth button
        document.getElementById('photobooth-btn').addEventListener('click', () => {
            window.location.href = '/photobooth';
        });

        // Close ad button
        document.getElementById('ad-close').addEventListener('click', () => {
            hideAdvertisement();
        });

        // Keyboard shortcuts for testing
        document.addEventListener('keydown', (e) => {
            if (e.key === 'n') {
                // Next template
                clearTimeout(CONFIG.templateTimer);
                displayTemplate(CONFIG.currentTemplateIndex + 1);
            } else if (e.key === 'a') {
                // Show ad immediately
                if (CONFIG.advertisements.length > 0) {
                    showAdvertisement(CONFIG.advertisements[CONFIG.currentAdIndex]);
                }
            } else if (e.key === 'r') {
                // Reload
                location.reload();
            }
        });

        // =====================================================
        // UTILITY FUNCTIONS
        // =====================================================
        
        function showError(message) {
            const display = document.getElementById('main-display');
            display.innerHTML = `
                <div class="error-message">
                    <h1>⚠️ Error</h1>
                    <p>${message}</p>
                    <button onclick="location.reload()">Reload</button>
                </div>
            `;
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            loading.classList.toggle('hidden', !show);
        }

        // =====================================================
        // INITIALIZE
        // =====================================================
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📺 Digital Signage Client v2.0');
            console.log('🔧 Configuration loaded');
            initDisplay();
        });

        // Handle visibility change (reload when tab becomes visible)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                console.log('👁️  Tab visible, reloading...');
                location.reload();
            }
        });
    </script>
</body>
</html>
