<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage Display</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <!-- Logo Section -->
            <div class="logo-section">
                <img src="{{ url_for('static', filename='logos/logo1.png') }}" alt="Logo 1" class="logo" onerror="this.style.display='none'">
                <img src="{{ url_for('static', filename='logos/logo2.png') }}" alt="Logo 2" class="logo" onerror="this.style.display='none'">
            </div>
            
            <!-- Date Time Section -->
            <div class="datetime-section">
                <div class="time" id="current-time">12:00</div>
                <div class="day" id="current-day">Senin</div>
                <div class="date" id="current-date">Februari 25</div>
            </div>
            
            <!-- Agenda List -->
            <div class="agenda-list" id="agenda-list">
                {% for agenda in agendas %}
                <div class="agenda-item" data-id="{{ agenda['id'] }}" data-media-type="{{ agenda['media_type'] }}" data-media-path="{{ agenda['media_path'] }}">
                    <div class="agenda-title">{{ agenda['title'] }}</div>
                    <div class="agenda-description">{{ agenda['description'] }}</div>
                    <div class="agenda-date">📅 {{ agenda['event_date'] }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Media Display -->
            <div class="media-display" id="media-display"></div>
            
            <!-- News + Barcode Section -->
            <div class="bottom-section">
                <div class="news-section">
                    <div class="news-title">📰<br>Berita<br>Terkini</div>
                    <div class="news-ticker-wrapper">
                        <div class="news-ticker" id="news-ticker">
                            {% for item in news %}
                            <div class="news-item">{{ item['content'] }}</div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                
                <!-- Barcode Fixed -->
                <div class="barcode-section">
                    <img src="{{ url_for('static', filename='logos/barcode.png') }}" alt="QR Code" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Advertisement Popup -->
    <div class="ad-popup hidden" id="ad-popup">
        <div class="ad-content" id="ad-content"></div>
        <button class="ad-close" id="ad-close">✕</button>
    </div>
    
    <!-- Floating Menu Button -->
    <div class="floating-menu-button" id="menu-button">
        <div class="menu-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <!-- Floating Menu Apps -->
    <div class="floating-menu" id="floating-menu">
        <a href="{{ url_for('photobooth') }}" class="menu-app camera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
            <span class="menu-app-label">Photobooth</span>
        </a>
        
        <div class="menu-app gallery" onclick="window.location.href='/gallery'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span class="menu-app-label">Gallery</span>
        </div>
        
        <div class="menu-app settings" onclick="alert('Settings - Use manage_data.py')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6"></path>
            </svg>
            <span class="menu-app-label">Settings</span>
        </div>
        
        <div class="menu-app admin" onclick="alert('Admin - Use manage_data.py')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="menu-app-label">Admin</span>
        </div>
    </div>
    
    <!-- Menu Overlay -->
    <div class="menu-overlay hidden" id="menu-overlay"></div>
    
    <script>
        window.SIGNAGE_DATA = {
            templates: {{ templates|tojson|safe }},
            advertisements: {{ ads|tojson|safe }},
            agendas: {{ agendas|tojson|safe }}
        };
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
