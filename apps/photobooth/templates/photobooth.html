<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/photobooth/static/css/photobooth.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     SCREEN 1 — IDLE / FRAME SELECT
     ═══════════════════════════════════════════ -->
<div class="screen active" id="screen-idle">
    <div class="idle-bg"></div>
    <header class="pb-header">
        <h1 class="pb-title">📸 Photobooth</h1>
        <p class="pb-subtitle">Pilih frame lalu mulai sesi foto!</p>
    </header>

    <div class="frame-selector" id="frame-selector">
        {% for frame in frames %}
        <div class="frame-thumb {{ 'selected' if loop.first else '' }}"
             data-frame="{{ frame }}"
             onclick="selectFrame(this)">
            <img src="/photobooth/imgs/frames/{{ frame }}" alt="{{ frame }}">
            <div class="frame-check">✓</div>
            <span class="frame-label">Frame {{ loop.index }}</span>
        </div>
        {% endfor %}
    </div>

    <button class="btn-start" onclick="startSession()">
        <span>📷</span> Start Capture
    </button>
    <a href="/" class="btn-back-home">← Kembali ke Beranda</a>
</div>

<!-- ═══════════════════════════════════════════
     SCREEN 2 — CAPTURE SESSION
     ═══════════════════════════════════════════ -->
<div class="screen" id="screen-capture">
    <div class="capture-layout">

        <!-- TOP ROW: camera + side panel -->
        <div class="capture-top">

            <!-- CENTER: Camera + countdown -->
            <div class="camera-panel">
                <div class="shot-info" id="shot-info">Foto 1 dari 3</div>

                <div class="camera-box" id="camera-box">
                    <video id="camera-feed" autoplay muted playsinline></video>
                    <div class="cam-flash"  id="cam-flash"></div>
                    <div class="cam-countdown hidden" id="cam-countdown">
                        <span id="cd-number">5</span>
                    </div>
                </div>

                <div class="status-bar" id="status-bar">Memulai kamera…</div>
            </div>

            <!-- RIGHT: Dots + frame thumb -->
            <div class="side-panel">
                <div class="dots" id="dots">
                    <div class="dot" id="dot-0"></div>
                    <div class="dot" id="dot-1"></div>
                    <div class="dot" id="dot-2"></div>
                </div>
                <p class="side-hint">Foto otomatis saat<br>hitung mundur selesai</p>
                <div class="frame-mini">
                    <p>Frame:</p>
                    <img id="frame-mini-img" src="" alt="">
                </div>
            </div>

        </div>

        <!-- BOTTOM: Landscape strip preview -->
        <div class="strip-panel">
            <div class="strip-label">HASIL FOTO</div>
            <div class="strip-slots">
                <div class="strip-slot" id="strip-0"><span>1</span></div>
                <div class="strip-slot" id="strip-1"><span>2</span></div>
                <div class="strip-slot" id="strip-2"><span>3</span></div>
            </div>
        </div>

    </div>
</div>

<!-- ═══════════════════════════════════════════
     SCREEN 3 — COMPOSITING (browser canvas)
     ═══════════════════════════════════════════ -->
<div class="screen" id="screen-compositing">
    <div class="compositing-wrap">
        <div class="spinner"></div>
        <p>Menyusun foto…</p>
    </div>
</div>

<!-- ═══════════════════════════════════════════
     SCREEN 4 — RESULT PREVIEW (10s)
     ═══════════════════════════════════════════ -->
<div class="screen" id="screen-result">
    <div class="result-wrap">
        <h2 class="result-title">✨ Foto Siap!</h2>

        <div class="result-img-wrap">
            <!-- Final composited image shown here -->
            <img id="result-img" src="" alt="hasil foto">
        </div>

        <div class="result-bar-wrap">
            <div class="result-bar-fill" id="result-bar"></div>
        </div>
        <p class="result-hint">Kembali otomatis dalam <strong id="result-sec">10</strong> detik</p>

        <button class="btn-home" onclick="goHome()">🏠 Kembali Sekarang</button>
    </div>
</div>

<!-- Hidden canvas used for compositing -->
<canvas id="compose-canvas" style="display:none"></canvas>

<script src="/photobooth/static/js/photobooth.js"></script>
</body>
</html>
